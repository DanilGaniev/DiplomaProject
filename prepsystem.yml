---
- name: Prepare nodes for Kubernetes
  hosts: masters, workers
  become: yes
  tasks:
    - name: Set Google DNS
      lineinfile:
        path: /etc/resolv.conf
        regexp: '^nameserver.*'
        line: 'nameserver 8.8.8.8'

    - name: Disable SWAP immediately
      command: swapoff -a
      changed_when: false  # Команда выполняется всегда, но статус changed нам тут не нужен

    - name: Remove SWAP from /etc/fstab permanently
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+.*)$'
        replace: '# \1'

    # Модули ядра и sysctl уже созданы Паккером, но эти таски проверяют их статус на лету
    - name: Ensure kernel modules are loaded
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Ensure sysctl parameters are applied
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-kubernetes-cri.conf
        state: present
        reload: yes
      loop:
        - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { key: 'net.ipv4.ip_forward', value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }

    # Containerd уже установлен Паккером, таска просто проверит его наличие
    - name: Ensure Containerd is installed
      apt:
        name: containerd
        state: present

    # Вместо грубой перезаписи файла через shell, точечно проверяем нужный параметр
    - name: Verify SystemdCgroup is set to true in Containerd config
      lineinfile:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup ='
        line: '            SystemdCgroup = true'
      notify: Restart Containerd

    - name: Ensure Containerd is enabled and running
      service:
        name: containerd
        state: started
        enabled: yes

  handlers:
    - name: Restart Containerd
      service:
        name: containerd
        state: restarted