---
- name: Verify and configure Kubernetes components
  hosts: masters, workers
  become: yes
  tasks:
    - name: Clean up old Kubernetes repo files and keys
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/kubernetes.list
        - /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Ensure directory for apt key exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Kubernetes GPG key to temporary file
      get_url:
        url: https://mirrors.aliyun.com/kubernetes-new/core/stable/v1.30/deb/Release.key
        dest: /tmp/kubernetes-release.key
        mode: '0644'

    - name: Dearmor Kubernetes GPG key properly (fixes apt warnings)
      shell: gpg --dearmor < /tmp/kubernetes-release.key > /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Clean up temporary key file
      file:
        path: /tmp/kubernetes-release.key
        state: absent

    - name: Configure Kubernetes repository (Alibaba mirror)
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://mirrors.aliyun.com/kubernetes-new/core/stable/v1.30/deb/ /'

    - name: Force apt cache update and verify K8s tools are installed
      apt:
        name: [kubelet, kubeadm, kubectl]
        state: present
        update_cache: yes
      register: apt_result
      until: apt_result is success
      retries: 5
      delay: 10

    - name: Lock K8s tools versions (native apt-mark hold)
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl