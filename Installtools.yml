---
- name: Verify and configure Kubernetes components
  hosts: masters, workers
  become: yes
  tasks:
    - name: Ensure directory for apt key exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Ensure stable Kubernetes GPG key is present
      get_url:
        url: https://mirrors.aliyun.com/kubernetes-new/core/stable/v1.30/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        mode: '0644'

    - name: Configure Kubernetes repository (pointing to stable Alibaba mirror)
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://mirrors.aliyun.com/kubernetes-new/core/stable/v1.30/deb/ /'

    - name: Verify K8s tools are installed (should be OK instantly due to Packer)
      apt:
        name: [kubelet, kubeadm, kubectl]
        state: present
        update_cache: yes

    - name: Lock K8s tools versions (native apt-mark hold)
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl