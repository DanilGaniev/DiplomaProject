---
- name: Verify and configure Kubernetes components
  hosts: masters, workers
  become: yes
  tasks:
    - name: Clean up old Kubernetes repo files
      file:
        path: /etc/apt/sources.list.d/kubernetes.list
        state: absent

    - name: Ensure directory for apt key exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Delete old keyring to avoid conflicts
      file:
        path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        state: absent

    - name: Import Kubernetes GPG key directly from Ubuntu keyserver by ID
      shell: gpg --no-default-keyring --keyring /etc/apt/keyrings/kubernetes-apt-keyring.gpg --keyserver keyserver.ubuntu.com --recv-keys 234654DA9A296436

    - name: Configure Kubernetes repository (Alibaba mirror)
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://mirrors.aliyun.com/kubernetes-new/core/stable/v1.30/deb/ /'

    - name: Force apt cache update and verify K8s tools are installed
      apt:
        name: [kubelet, kubeadm, kubectl]
        state: present
        update_cache: yes
      register: apt_result
      until: apt_result is success
      retries: 3
      delay: 10

    - name: Lock K8s tools versions (native apt-mark hold)
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl