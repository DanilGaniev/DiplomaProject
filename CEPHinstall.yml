---
- name: Automate Rook-Ceph Infrastructure Deployment
  hosts: masters # Выполняем прямо на k8s-master, где kubectl уже работает
  tasks:
    - name: Create temporary directory for Ceph manifests on K8s Master
      file:
        path: /home/dandi/ceph-manifests
        state: directory
        mode: '0755'

    - name: Copy manifests from Ansible-Master to K8s Master
      copy:
        src: "{{ item }}"
        dest: "/home/dandi/ceph-manifests/{{ item }}"
        mode: '0644'
      with_items:
        - CephCluster.yaml
        - ceph-pool.yaml
        - storage.yaml
        - 1GB-storage.yaml

    - name: Apply Rook CRDs, Common resources and Operator
      shell: |
        kubectl apply -f https://raw.githubusercontent.com/rook/rook/v1.16.2/deploy/examples/crds.yaml
        kubectl apply -f https://raw.githubusercontent.com/rook/rook/v1.16.2/deploy/examples/common.yaml
        kubectl apply -f https://raw.githubusercontent.com/rook/rook/v1.16.2/deploy/examples/operator.yaml

    - name: Wait for Rook Ceph Operator to be Running
      shell: kubectl -n rook-ceph rollout status deployment/rook-ceph-operator --timeout=5m

    - name: Deploy Custom CephCluster configuration
      shell: kubectl apply -f /home/dandi/ceph-manifests/CephCluster.yaml

    - name: Wait for CephCluster to reach Ready Phase (can take 3-5 minutes)
      shell: kubectl -n rook-ceph get cephcluster rook-ceph -o jsonpath='{.status.phase}'
      register: cluster_phase
      until: cluster_phase.stdout == "Ready"
      retries: 40
      delay: 15

    - name: Deploy Storage Pool and StorageClass
      shell: |
        kubectl apply -f /home/dandi/ceph-manifests/ceph-pool.yaml
        kubectl apply -f /home/dandi/ceph-manifests/storage.yaml

    - name: Deploy Test Pod and Test PVC
      shell: kubectl apply -f /home/dandi/ceph-manifests/1GB-storage.yaml

    - name: Wait for test PVC to become Bound
      shell: kubectl get pvc ceph-test-pvc -o jsonpath='{.status.phase}'
      register: pvc_status
      until: pvc_status.stdout == "Bound"
      retries: 15
      delay: 10

    - name: Wait for Test Pod to become Running
      shell: kubectl get pod ceph-test-pod -o jsonpath='{.status.phase}'
      register: pod_status
      until: pod_status.stdout == "Running"
      retries: 15
      delay: 10

    - name: Display Final Verification Metrics
      shell: |
        echo "--- PVC STATUS ---"
        kubectl get pvc ceph-test-pvc
        echo "--- POD STATUS ---"
        kubectl get pod ceph-test-pod
      register: execution_summary

    - name: Print summary to stdout
      debug:
        msg: "{{ execution_summary.stdout_lines }}"