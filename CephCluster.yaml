apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  cephVersion:
    image: quay.io/ceph/ceph:v19.2.0
    allowUnsupported: false
  dataDirHostPath: /var/lib/rook
  mon:
    count: 3
    allowMultiplePerNode: true
  mgr:
    count: 2
  dashboard:
    enabled: false
    ssl: false
  crashCollector:
    disable: false
  priorityClassNames:
    all: system-cluster-critical
  storage:
    useAllNodes: false
    useAllDevices: false
    config:
      osd_pool_default_size: "2"     # Автоматически выставляет 2 реплики
      osd_pool_default_min_size: "1" # Позволяет писать при одной живой ноде
    nodes:
      - name: "k8s-worker-1"
        devices:
          - name: "vdb"
      - name: "k8s-worker-2"
        devices:
          - name: "vdb"