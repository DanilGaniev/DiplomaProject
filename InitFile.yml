---
- name: Initialize Kubernetes Cluster
  hosts: masters
  become: yes
  tasks:
    - name: Initialize the cluster using kubeadm
      # Поменяли CIDR на безопасный 10.244.0.0/16
      command: kubeadm init --pod-network-cidr=10.244.0.0/16 --apiserver-advertise-address={{ ansible_host }}
      register: kubeadm_init
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Create .kube directory for dandi
      file:
        path: /home/dandi/.kube
        state: directory
        owner: dandi
        group: dandi
        mode: '0755'

    - name: Copy admin.conf to user's kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/dandi/.kube/config
        remote_src: yes
        owner: dandi
        group: dandi
        mode: '0644'

    - name: Download Calico manifest
      become: false
      get_url:
        url: https://raw.githubusercontent.com/projectcalico/calico/v3.27.3/manifests/calico.yaml
        dest: /home/dandi/calico.yaml

    - name: Adjust Calico CIDR to match our cluster
      become: false
      replace:
        path: /home/dandi/calico.yaml
        regexp: '192.168.0.0/16'
        replace: '10.244.0.0/16'

    - name: Install Calico Pod Network
      become: false
      command: kubectl apply -f /home/dandi/calico.yaml
      args:
        creates: /etc/cni/net.d/10-calico.conflist

    - name: Generate join command
      command: kubeadm token create --print-join-command
      register: join_command_raw

    - name: Set join command fact
      set_fact:
        join_command: "{{ join_command_raw.stdout }}"

- name: Join Worker Nodes to Cluster
  hosts: workers
  become: yes
  tasks:
    - name: Join the cluster
      command: "{{ hostvars[groups['masters'][0]]['join_command'] }}"
      args:
        creates: /etc/kubernetes/kubelet.conf