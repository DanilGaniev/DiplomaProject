---
# ПЛЕЙ 1: Настройка ОС и установка lvm2 на все ноды (мастера и воркеры) с правами root
- name: Install Prerequisites on All Nodes
  hosts: all
  become: true
  tasks:
    - name: Install lvm2 (required for Ceph OSD)
      ansible.builtin.apt:
        name: lvm2
        state: present
        update_cache: yes

# ПЛЕЙ 2: Разворачиваем приложения и мониторинг на k8s-master
- name: Deploy Nginx, Rook Ceph, and Monitoring Stack
  hosts: masters
  become: false
  tasks:

    - name: Copy Nginx manifest to k8s-master
      ansible.builtin.copy:
        src: /home/dandi/DiplomaProject/Nginx.yaml
        dest: /home/dandi/Nginx.yaml
        mode: '0644'

    - name: Apply Nginx manifest
      ansible.builtin.command: kubectl apply -f /home/dandi/Nginx.yaml

    - name: Copy Monitoring values to k8s-master
      ansible.builtin.copy:
        src: /home/dandi/DiplomaProject/Monitoring.yaml
        dest: /home/dandi/Monitoring.yaml
        mode: '0644'

    - name: Download Helm installer script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm.sh
        mode: '0700'

    - name: Install Helm to system
      ansible.builtin.command: /tmp/get_helm.sh
      become: true

    - name: Remove Helm installer script
      ansible.builtin.file:
        path: /tmp/get_helm.sh
        state: absent

    - name: Create monitoring namespace (idempotent)
      ansible.builtin.shell: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

    # ---- СКАЧИВАНИЕ ЧАРТОВ СИЛАМИ СИСТЕМНОГО CURL НА LOCALHOST ----

    - name: Download Rook Ceph chart via curl on ansible-master (localhost)
      ansible.builtin.shell: >
        curl -4 -sSL --connect-timeout 15 --retry 5 --retry-delay 5
        https://charts.rook.io/release/rook-ceph-v1.19.5.tgz 
        -o /tmp/rook-ceph-v1.19.5.tgz
      delegate_to: localhost

    - name: Download kube-prometheus-stack chart via curl on ansible-master (localhost)
      ansible.builtin.shell: >
        curl -4 -sSL --connect-timeout 15 --retry 5 --retry-delay 5
        https://prometheus-community.github.io/helm-charts/kube-prometheus-stack-85.1.1.tgz 
        -o /tmp/kube-prometheus-stack-85.1.1.tgz
      delegate_to: localhost

    # ---- ОТПРАВКА НА K8S-MASTER ЧЕРЕЗ SSH ----

    - name: Copy Rook Ceph chart to k8s-master
      ansible.builtin.copy:
        src: /tmp/rook-ceph-v1.19.5.tgz
        dest: /tmp/rook-ceph-v1.19.5.tgz
        mode: '0644'

    - name: Copy kube-prometheus-stack chart to k8s-master
      ansible.builtin.copy:
        src: /tmp/kube-prometheus-stack-85.1.1.tgz
        dest: /tmp/kube-prometheus-stack-85.1.1.tgz
        mode: '0644'

    # ---- ДЕПЛОЙ ИЗ ЛОКАЛЬНЫХ АРХИВОВ С ТАЙМАУТОМ КЛАСТЕРА ----

    - name: Deploy Rook Ceph Operator via Helm
      ansible.builtin.command: >
        helm upgrade --install rook-ceph /tmp/rook-ceph-v1.19.5.tgz
        --namespace rook-ceph --create-namespace
        --timeout 10m

    - name: Deploy kube-prometheus-stack via Helm
      ansible.builtin.command: >
        helm upgrade --install kube-prom-stack /tmp/kube-prometheus-stack-85.1.1.tgz
        --namespace monitoring
        -f /home/dandi/Monitoring.yaml
        --timeout 10m

    # ------------------------------------------------

    - name: Get Grafana admin password
      ansible.builtin.shell: kubectl get secret --namespace monitoring kube-prom-stack-grafana -o jsonpath="{.data.admin-password}" | base64 --decode
      register: grafana_password_raw

    - name: Save Grafana password to file on ansible-master
      ansible.builtin.copy:
        content: "{{ grafana_password_raw.stdout }}"
        dest: /home/dandi/grafana_password.txt
        mode: '0600'
      delegate_to: localhost