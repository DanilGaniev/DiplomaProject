---
# ПЛЕЙ 1: Настройка ОС и установка lvm2 на все ноды (мастера и воркеры) с правами root
- name: Install Prerequisites and Optimize Network on All Nodes
  hosts: all
  become: true
  tasks:
    - name: Disable IPv6 via sysctl to avoid Helm/Go network timeouts
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: '1'
        state: present
        reload: yes
      loop:
        - net.ipv6.conf.all.disable_ipv6
        - net.ipv6.conf.default.disable_ipv6
        - net.ipv6.conf.lo.disable_ipv6

    - name: Install lvm2 (required for Ceph OSD)
      ansible.builtin.apt:
        name: lvm2
        state: present
        update_cache: yes

# ПЛЕЙ 2: Разворачиваем приложения и мониторинг на k8s-master
- name: Deploy Nginx, Rook Ceph, and Monitoring Stack
  hosts: masters
  become: false
  tasks:

    - name: Copy Nginx manifest to k8s-master
      ansible.builtin.copy:
        src: /home/dandi/DiplomaProject/Nginx.yaml
        dest: /home/dandi/Nginx.yaml
        mode: '0644'

    - name: Apply Nginx manifest
      ansible.builtin.command: kubectl apply -f /home/dandi/Nginx.yaml

    - name: Copy Monitoring values to k8s-master
      ansible.builtin.copy:
        src: /home/dandi/DiplomaProject/Monitoring.yaml
        dest: /home/dandi/Monitoring.yaml
        mode: '0644'

    - name: Download Helm installer script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm.sh
        mode: '0700'

    - name: Install Helm to system
      ansible.builtin.command: /tmp/get_helm.sh
      become: true

    - name: Remove Helm installer script
      ansible.builtin.file:
        path: /tmp/get_helm.sh
        state: absent

    - name: Create monitoring namespace (idempotent)
      ansible.builtin.shell: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

    # ---- ДЕПЛОЙ НАПРЯМУЮ ЧЕРЕЗ URL РЕПОЗИТОРИЕВ С RETRY ----

    - name: Deploy Rook Ceph Operator via Helm
      ansible.builtin.command: >
        helm upgrade --install rook-ceph rook-ceph
        --repo https://charts.rook.io/release
        --namespace rook-ceph --create-namespace
        --timeout 10m
      register: rook_deploy
      until: rook_deploy.rc == 0
      retries: 3
      delay: 15

    - name: Deploy kube-prometheus-stack via Helm
      ansible.builtin.command: >
        helm upgrade --install kube-prom-stack kube-prometheus-stack
        --repo https://prometheus-community.github.io/helm-charts
        --namespace monitoring
        -f /home/dandi/Monitoring.yaml
        --timeout 10m
      register: prom_deploy
      until: prom_deploy.rc == 0
      retries: 3
      delay: 15

    # ------------------------------------------------

    - name: Get Grafana admin password
      ansible.builtin.shell: kubectl get secret --namespace monitoring kube-prom-stack-grafana -o jsonpath="{.data.admin-password}" | base64 --decode
      register: grafana_password_raw

    - name: Save Grafana password to file on ansible-master
      ansible.builtin.copy:
        content: "{{ grafana_password_raw.stdout }}"
        dest: /home/dandi/grafana_password.txt
        mode: '0600'
      delegate_to: localhost